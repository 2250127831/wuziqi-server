worker_processes 1;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;

    # 代理到后端服务 - 正确定义不同的 upstream
    upstream auth_service {
        server 127.0.0.1:8001;
    }

    upstream match_service {
        server 127.0.0.1:8002;
    }

    upstream game_ws_service {
        server 127.0.0.1:8003;  # WebSocket 服务
    }

    upstream game_http_service {
        server 127.0.0.1:8004;  # HTTP 服务（健康检查、内部接口）
    }

    server {
        listen 7999;
        server_name localhost;

        # 网关自身健康检查
        location /health {
            return 200 'Gateway OK';
        }

        # 认证服务 API
        location /api/register {
            proxy_pass http://auth_service/api/register;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/login {
            proxy_pass http://auth_service/api/login;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/verify {
            proxy_pass http://auth_service/api/verify;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 认证服务的健康检查
        location /api/auth/health {
            proxy_pass http://auth_service/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # 匹配服务 API
        location /api/match/ {
            proxy_pass http://match_service/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 匹配服务的健康检查
        location /api/match/health {
            proxy_pass http://match_service/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # WebSocket 连接
        location /ws {
            proxy_pass http://game_ws_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # 游戏服务内部接口和健康检查
        location /internal/ {
            proxy_pass http://game_http_service/internal/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 游戏服务健康检查
        location /internal/health {
            proxy_pass http://game_http_service/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # 根路径 - 返回前端静态文件
        location / {
            root /var/www/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /var/www/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # gzip 压缩
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
        gzip_min_length 1000;
    }
}